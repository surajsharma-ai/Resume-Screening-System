<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Job</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><i class="fas fa-bullseye"></i> AI Resume Screener</div>
        <div class="nav-links">
            <a href="{{ url_for('recruiter_dashboard') }}"><i class="fas fa-home"></i> Dashboard</a>
            <a href="{{ url_for('post_job') }}"><i class="fas fa-plus"></i> Post Job</a>
            <a href="{{ url_for('logout') }}" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </nav>

    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <div class="form-card">
            <h2><i class="fas fa-plus-circle"></i> Post New Job</h2>
            
            <form method="POST">
                <div class="form-row">
                    <div class="form-group">
                        <label>Job Title *</label>
                        <input type="text" name="title" required placeholder="Senior Python Developer">
                    </div>
                    <div class="form-group">
                        <label>Company *</label>
                        <input type="text" name="company" value="{{ company }}" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" name="location" placeholder="New York / Remote">
                    </div>
                    <div class="form-group">
                        <label>Experience (years)</label>
                        <input type="number" name="experience" value="2" min="0">
                    </div>
                </div>
                <div class="form-group">
                    <label>Salary Range</label>
                    <input type="text" name="salary" placeholder="$80,000 - $120,000">
                </div>
                <div class="form-group">
                    <label>Job Description *</label>
                    <textarea name="description" rows="4" required placeholder="Describe the role..."></textarea>
                </div>
                <div class="form-group">
                    <label>Requirements *</label>
                    <textarea name="requirements" rows="4" required placeholder="List requirements..."></textarea>
                </div>
                <div class="form-group">
                    <label>Required Skills * (comma-separated)</label>
                    <input type="text" name="skills" required placeholder="python, machine learning, sql, django">
                </div>
                <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-paper-plane"></i> Post Job</button>
            </form>
        </div>
    </div>
</body>
</html>
